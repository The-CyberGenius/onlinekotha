<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GKQ286KWDG"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GKQ286KWDG');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password — Kotha</title>
    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex items-center justify-center h-screen w-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100">
    <div class="bg-white/80 backdrop-blur-xl border border-white/60 rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <img src="/logo.svg" alt="Kotha Logo" class="inline-flex w-16 h-16 rounded-2xl shadow-lg mb-3" />
            <h1 class="text-2xl font-extrabold text-gray-800">Reset your password</h1>
            <p class="text-sm text-gray-500 mt-1">We'll email you a link to set a new one</p>
        </div>

        <form id="forgot-form" class="space-y-3">
            <input type="email" id="email" required placeholder="Email" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            <button type="submit" id="submit-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-xl transition shadow">Send reset link</button>
        </form>

        <div id="success-msg" class="hidden mt-4 bg-green-50 text-green-800 rounded-xl p-3 text-sm font-semibold text-center">
            ✓ If that email is registered, a reset link is on its way. Check your inbox.
        </div>

        <p class="text-center text-xs text-gray-500 mt-6">
            <a href="/login.html" class="font-bold text-indigo-600 hover:underline">← Back to login</a>
        </p>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            try {
                await fetch('/api/auth/forgot', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                document.getElementById('forgot-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch {
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        });
    </script>
</body>
</html>
