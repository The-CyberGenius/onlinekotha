<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GKQ286KWDG"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GKQ286KWDG');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Kotha</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex items-center justify-center min-h-[100dvh] w-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 p-4">
    <div class="bg-white/80 backdrop-blur-xl border border-white/60 rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <img src="/logo.svg" alt="Kotha Logo" class="inline-flex w-16 h-16 rounded-2xl shadow-lg mb-3" />
            <h1 class="text-2xl font-extrabold text-gray-800">Kotha</h1>
            <p class="text-sm text-gray-500 mt-1">Your chats, beautifully preserved</p>
        </div>

        <div class="flex gap-2 bg-gray-100 rounded-xl p-1 mb-5">
            <button id="tab-login" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600">Login</button>
            <button id="tab-signup" class="flex-1 py-2 rounded-lg font-bold text-sm text-gray-500">Sign up</button>
        </div>

        <!-- Google OAuth button — only shown if configured -->
        <a id="google-btn" href="#" class="hidden w-full flex items-center justify-center gap-3 bg-white border border-gray-200 hover:border-gray-300 hover:shadow-sm transition rounded-xl py-2.5 mb-3 font-bold text-sm text-gray-700">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34 6.2 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34 6.2 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.4-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C41.9 35.4 44 30 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
            Continue with Google
        </a>

        <!-- Divider (shown only with Google) -->
        <div id="auth-divider" class="hidden items-center gap-3 mb-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span>or with email</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <form id="auth-form" class="space-y-3">
            <div>
                <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Email</label>
                <input type="email" id="email" required class="w-full mt-1 bg-white border border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-600 uppercase tracking-wider">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full mt-1 bg-white border border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-xl transition shadow">Login</button>
            <p id="error-msg" class="text-xs text-red-600 font-semibold text-center hidden"></p>
            <p class="text-center text-xs text-gray-500 mt-2"><a href="/forgot.html" class="font-bold text-indigo-600 hover:underline">Forgot password?</a></p>
            <p id="trial-info" class="text-xs text-indigo-700 font-semibold text-center bg-indigo-50 rounded-lg py-2 hidden">
                🎁 New users get <b>1 day free trial</b> of AI chat features
            </p>
        </form>
    </div>

    <script>
        let mode = 'login';
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const submitBtn = document.getElementById('submit-btn');
        const trialInfo = document.getElementById('trial-info');
        const errorMsg = document.getElementById('error-msg');

        function getNext() {
            const params = new URLSearchParams(window.location.search);
            const n = params.get('next');
            if (n && n.startsWith('/')) return n;
            return '/app';
        }

        function switchMode(newMode) {
            mode = newMode;
            const isLogin = mode === 'login';
            tabLogin.className = isLogin
                ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600'
                : 'flex-1 py-2 rounded-lg font-bold text-sm text-gray-500';
            tabSignup.className = !isLogin
                ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600'
                : 'flex-1 py-2 rounded-lg font-bold text-sm text-gray-500';
            submitBtn.textContent = isLogin ? 'Login' : 'Create account';
            trialInfo.classList.toggle('hidden', isLogin);
            errorMsg.classList.add('hidden');
        }

        tabLogin.addEventListener('click', () => switchMode('login'));
        tabSignup.addEventListener('click', () => switchMode('signup'));

        // Respect #signup hash from landing page CTAs
        if (window.location.hash === '#signup') switchMode('signup');

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Please wait...';

            try {
                const resp = await fetch(`/api/auth/${mode}`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Failed');
                const me = await (await fetch('/api/auth/me?_t=' + Date.now())).json();
                window.location.href = me.user && me.user.is_admin ? '/admin.html' : getNext();
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'login' ? 'Login' : 'Create account';
            }
        });

        // Show Google button if backend is configured
        (async () => {
            try {
                const r = await (await fetch('/api/auth/status')).json();
                if (r.google) {
                    const next = encodeURIComponent(getNext());
                    const googleBtn = document.getElementById('google-btn');
                    googleBtn.href = `/api/auth/google?next=${next}`;
                    googleBtn.classList.remove('hidden');
                    const divider = document.getElementById('auth-divider');
                    divider.classList.remove('hidden');
                    divider.classList.add('flex');
                }
            } catch {}
        })();

        // If already logged in, redirect straight to next
        (async () => {
            try {
                const me = await (await fetch('/api/auth/me?_t=' + Date.now())).json();
                if (me.user) window.location.href = me.user.is_admin ? '/admin.html' : getNext();
            } catch {}
        })();

        // Show OAuth error from query (?error=oauth_failed)
        const urlErr = new URLSearchParams(window.location.search).get('error');
        if (urlErr) {
            const e = document.getElementById('error-msg');
            e.textContent = urlErr === 'oauth_failed'
                ? "Couldn't sign in with Google. Try again?"
                : urlErr === 'oauth_disabled'
                ? 'Google sign-in is not configured.'
                : 'Sign-in failed';
            e.classList.remove('hidden');
        }
    </script>
</body>
</html>
