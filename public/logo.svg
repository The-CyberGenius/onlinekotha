<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Subtle path glow — stdDeviation 3 not 10 (was causing blur) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#8b5cf6" flood-opacity="0.55"/>
    </filter>
    <!-- Tight orb glow for the moving dot -->
    <filter id="orb" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Main infinity ribbon -->
  <path d="M35 30 C 15 30 15 70 35 70 C 50 70 50 30 65 30 C 85 30 85 70 65 70 C 50 70 50 30 35 30 Z"
        fill="none" stroke="url(#g1)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Color overlay ribbon -->
  <path d="M35 30 C 50 30 50 70 65 70"
        fill="none" stroke="url(#g2)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.95"/>

  <!-- Animated orb — smaller radius, tight glow only -->
  <circle r="5" filter="url(#orb)">
    <animate attributeName="fill" values="#ffffff;#ec4899;#8b5cf6;#4f46e5;#ffffff" dur="4s" repeatCount="indefinite"/>
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M35 30 C 15 30 15 70 35 70 C 50 70 50 30 65 30 C 85 30 85 70 65 70 C 50 70 50 30 35 30 Z"
      calcMode="linear"/>
  </circle>
</svg>
