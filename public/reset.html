<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password — Kotha</title>
    <script src="/js/tailwind.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex items-center justify-center h-screen w-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100">
    <div class="bg-white/80 backdrop-blur-xl border border-white/60 rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 items-center justify-center text-3xl mb-3">🔒</div>
            <h1 class="text-2xl font-extrabold text-gray-800">Set a new password</h1>
        </div>

        <form id="reset-form" class="space-y-3">
            <input type="password" id="password" required minlength="6" placeholder="New password (min 6 chars)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            <button type="submit" id="submit-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2.5 rounded-xl transition shadow">Set new password</button>
            <p id="error-msg" class="hidden text-xs text-red-600 font-semibold text-center"></p>
        </form>

        <div id="success-msg" class="hidden text-center">
            <div class="text-5xl mb-3">✓</div>
            <p class="font-bold text-gray-800 mb-2">Password updated</p>
            <a href="/login.html" class="text-indigo-600 font-bold text-sm hover:underline">Back to login</a>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) window.location.href = '/forgot.html';

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Updating...';
            try {
                const resp = await fetch('/api/auth/reset', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Failed');
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Set new password';
            }
        });
    </script>
</body>
</html>
